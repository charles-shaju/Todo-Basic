<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Todo{% endblock %}</title>
  </head>
  <body>
    <main style="max-width: 900px; margin: 24px auto; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
      <header style="margin-bottom: 16px;">
        <h1 style="margin: 0;">{% block header %}Full-Stack Todo (Django + JS){% endblock %}</h1>
      </header>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
